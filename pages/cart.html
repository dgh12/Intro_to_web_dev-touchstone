<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.1/css/all.css" integrity="sha384-vp86vTRFVJgpjF9jiIGPEEqYqlDwgyBgEF109VFjmqGmIY/Y4HV4d3Gp2irVfcrp" crossorigin="anonymous">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
        <script src="scripts/scripts.js"></script>
    </head>
    <header>
        <section class="cart">
            <img src="/photos/cart_icon.jpg" alt="cart icon">
        </section>
        <div class="cart-return">
            <a href="books.html">View More Books</a>
        </div>
    </header>
    <body>
        <section class="cart-items">
            <h2>Items in Cart</h2>
            <div class="default-view">
                <h3>Cart is Empty</h3>
            </div>
            <div class="items-in-cart"></div>
            <div class="cart-btns">
                <button onclick="clear_cart()" class="clear-cart">Clear Cart</button>
                <button onclick="process_order()" class="process-order-btn">Process Order</button>
            </div>
        </section>
    </body>
</html>
