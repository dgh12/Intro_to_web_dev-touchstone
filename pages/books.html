<!DOCTYPE html>
<html>
    <head>
        <title>
            Book Haven Bookstore - Books
        </title>
        <script src="add_to_cart.js"></script>
    </head>
    <body>
        <header>
            <img src="../photos/Book_Haven_Bookstore_Hero.png" alt="Hero Image" width="100%">
            <h1>Book Haven Bookstore</h1>
            <img src="../photos/BHB_logo.png" alt="bookstore logo" width="50px">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li>Books</li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="customer-feedback.html">Testimonials and Events</a></li>
                </ul>
            </nav>
        </header>
        <section>
            <form action="search">
                <input type="text" name="q" placeholder="Search books...">
                <input type="submit" value="Search">
            </form>
            <img src="../photos/cart_icon.jpg" alt="Cart Icon" width="20px">
        </section>
        <section>
            <h2>Our Books</h2>
            <form action="add_to_cart">
                <label for="book_1"><img src="../photos/Client3_Book1.png" alt="Book Image"></label>
                <input type="checkbox" id="book_1" name="book" value="Book 1">
                <label for="book_2"><img src="../photos/Client3_Book2.png" alt="Book Image"></label>
                <input type="checkbox" id="book_2" name="book" value="Book 2">
                <label for="book_3"><img src="../photos/Client3_Book3.png" alt="Book Image"></label>
                <input type="checkbox" id="book_3" name="book" value="Book 3">
                <label for="magazine_1"><img src="../photos/Client3_Magazine1.png" alt="Magazine Image"></label>
                <input type="checkbox" id="magazine_1" name="book" value="Magazine 1">
                <label for="magazine_2"><img src="../photos/Client3_Magazine2.png" alt="Magazine Image"></label>  
                <input type="checkbox" id="magazine_2" name="book" value="Magazine 2">
                <label for="magazine_3"><img src="../photos/Client3_Magazine3.png" alt="Magazine Image"></label>
                <input type="checkbox" id="magazine_3" name="book" value="Magazine 3">
                <label for="notebook"><img src="../photos/Client3_Notebook.png" alt="Notebook Image"></label>
                <input type="checkbox" id="notebook" name="book" value="Notebook">
                <label for="stickers"><img src="../photos/Client3_Stickers.png" alt="Stickers Image"></label>
                <input type="checkbox" id="stickers" name="book" value="Stickers">
                <label for="tote_bag"><img src="../photos/Client3_ToteBag.png" alt="Tote Bag Image"></label>
                <input type="checkbox" id="tote_bag" name="book" value="Tote Bag">
                <br>
                <input type="submit" value="Add to Cart">
            </form>
        </section>
        <footer>
            <div>
                <img src="../photos/Facebook_Logo_Primary.png" alt="social media icon" width="30px">
                <img src="../photos/X_logo-black.png" alt="social media icon" width="25px">
                <img src="../photos/Instagram_Glyph_Gradient.png" alt="social media icon" width="30px">
                <img src="../photos/TikTok_Logo_primary.jpg" alt="social media icon" width="30px">
            </div>
            <div>
                <h3>Newsletter</h3>
                <form action="" method="post">
                    <input type="email" placeholder="Your Email..." required>
                    <input type="button" value="Subscribe">
                </form>
            </div>
            <div>
                <a href="index.html">home</a>
                <a href="about.html">contact us</a>
                <a href="customer-feedback.html">customer feedback and events</a>
            </div>
        </footer>
    </body>
</html>
