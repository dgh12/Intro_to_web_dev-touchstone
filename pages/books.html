<!DOCTYPE html>
<html>
    <head>
        <title>
            Book Haven Bookstore - Books
        </title>
        <script src="scripts/scripts.js"></script>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.1/css/all.css" integrity="sha384-vp86vTRFVJgpjF9jiIGPEEqYqlDwgyBgEF109VFjmqGmIY/Y4HV4d3Gp2irVfcrp" crossorigin="anonymous">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    </head>
    <body class = "background">
        <header>
          <div class="header-container">
            <div class="hero-image-container">
                <img class="hero-image" src="../photos/Book_Haven_Bookstore_Hero.png" alt="" width="100%">
            </div>
            <h1 class = "header-title">Book Haven Bookstore</h1>
            <img class="logo" src="../photos/BHB_logo.png" alt="">
            <nav>
                <ul class="menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Books</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="customer-feedback.html">Testimonials and Events</a></li>
                </ul>
                <button class="hamburger-menu">
                    <input type="checkbox" name="check" id="check">
                    <label class = "h-menue" for="check" class="check-btn">
                        <i class="fas fa-bars"></i>
                    </label>
                    <div class="nav-mobile w3-animate-right">
                        <a href="index.html">Home</a>
                        <a href="#">Books</a>
                        <a href="about.html">About Us</a>
                        <a href="customer-feedback.html">Testimonials and Event</a>
                    </div>
                </button>
            </nav>
          </div>
        </header>
        <div class="container">
            <section class="search-cart-section">
                <form action="search">
                    <input type="text" name="q" placeholder="Search books...">
                    <input type="submit" value="Search">
                </form>
                <a href="cart.html">
                    <img src="/photos/cart_icon.jpg" alt="Cart Icon" width="20px">
                </a>
            </section>
            <section class="book-container">
                <h2>Our Books</h2>
                <div>
                    <form class="book-grid" onsubmit="Book_submission()" action="post" method="POST" >
                        <div>
                            <label name="book_1" for="book_1"><img src="../photos/Client3_Book1.png" alt="Book Image"></label>
                            <input class="d-checkbox" type="checkbox" id="book_1" name="book" value="Brie Mine 4Ever">  
                        </div>
                        <div>
                            <label for="book_2"><img src="../photos/Client3_Book2.png" alt="Book Image"></label>
                            <input class="d-checkbox" type="checkbox" id="book_2" name="book" value="Glory Riders">
                        </div>
                        <div>
                            <label for="book_3"><img src="../photos/Client3_Book3.png" alt="Book Image"></label>
                            <input class="d-checkbox" type="checkbox" id="book_3"  name="book" value="Sorcerers Shadowed Chronicles">
                        </div>
                        <div>
                            <label for="magazine_1"><img src="../photos/Client3_Magazine1.png" alt="Magazine Image"></label>
                            <input class="d-checkbox" type="checkbox" id="magazine_1" name="book" value="Ball Magazine">
                        </div>
                        <div>
                            <label for="magazine_2"><img src="../photos/Client3_Magazine2.png" alt="Magazine Image"></label>  
                            <input class="d-checkbox" type="checkbox" id="magazine_2" name="book" value="Travel Magazine">
                        </div>
                        <div>
                            <label for="magazine_3"><img src="../photos/Client3_Magazine3.png" alt="Magazine Image"></label>
                            <input class="d-checkbox" type="checkbox" id="magazine_3" name="book" value="Eat Magazine">
                        </div>
                        <div>
                            <label for="notebook"><img src="../photos/Client3_Notebook.png" alt="Notebook Image"></label>
                            <input class="d-checkbox" type="checkbox" id="notebook" name="book" value="Book Haven Notebook">
                        </div>
                        <div>
                            <label for="stickers"><img src="../photos/Client3_Stickers.png" alt="Stickers Image"></label>
                            <input class="d-checkbox" type="checkbox" id="stickers" name="book" value="Book Haven Stickers">
                        </div>
                        <div>
                            <label for="tote_bag"><img src="../photos/Client3_ToteBag.png" alt="Tote Bag Image"></label>
                            <input class="d-checkbox" type="checkbox" id="tote_bag" name="book" value="Book Haven Tote Bag">
                        </div>
                        <br>
                        <input type="submit" value="Add to Cart">
                    </form>
                </div>
            </section>
        </div>
        <footer class="footer">
            <div class="footer-flex-1">
                <div class="footer-flex-2">
                    <div class="newsletter">
                        <h3>Newsletter</h3>
                        <form onsubmit="Subscribe()" action="/post" method="POST">
                            <input class="clear" type="email" name="email" placeholder="Your Email..." required>
                            <input type="submit" value="Subscribe">
                        </form>
                    </div>
                    <div class="social-media">
                        <img style="width: 30px; background-color: #ffffff; padding: 2px;" src="../photos/Facebook_Logo_Primary.png" alt="social media icon">
                        <img style="width: 30px; background-color: #ffffff; padding: 2px;" src="../photos/X_logo-black.png" alt="social media icon">
                        <img style="width: 30px; background-color: #ffffff; padding: 2px;" src="../photos/Instagram_Glyph_Gradient.png" alt="social media icon" >
                        <img style="width: 30px; background-color: #ffffff; padding: 2px;" src="../photos/TikTok_Logo_primary.jpg" alt="social media icon" >
                    </div>
                </div>
                <div class="footer-links">
                    <a href="about.html">about us</a>
                    <a href="index.html">home</a>
                    <a href="customer-feedback.html">customer feedback and events</a>
                </div>
            </div>
        </footer>
    </body>
</html>
